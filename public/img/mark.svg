<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Dean on Deck">
  <defs><clipPath id="disc"><circle cx="50" cy="50" r="45"/></clipPath></defs>

  <!-- ink porthole field -->
  <circle cx="50" cy="50" r="45" fill="#0a1626"/>

  <!-- the brand's scarlet horizon, behind the anchor -->
  <g clip-path="url(#disc)">
    <line x1="2" y1="44" x2="98" y2="44" stroke="#e11d2a" stroke-width="2.4"/>
  </g>

  <!-- brass porthole frame -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#c8a45c" stroke-width="3"/>

  <!-- anchor -->
  <g fill="none" stroke="#f6f1e8" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="50" cy="26" r="5" stroke="#c8a45c"/>
    <line x1="50" y1="31" x2="50" y2="68"/>
    <line x1="39" y1="38" x2="61" y2="38"/>
    <path d="M27 54 C 28 69 39 73 50 68 C 61 73 72 69 73 54"/>
    <path d="M27 54 L 22 50 M27 54 L 33 53"/>
    <path d="M73 54 L 78 50 M73 54 L 67 53"/>
  </g>
</svg>
